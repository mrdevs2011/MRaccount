<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRaccount</title>
<link rel="stylesheet" href="/CSS/style.css">
</head>
<body>

<!-- ── AUTH SAHIFASI ──────────────────────────────────────────── -->
<div id="pageAuth" class="page">
  <div class="card">

    <div class="logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="#5b8ef5"/>
        <text x="18" y="25" text-anchor="middle" font-size="16" font-weight="700"
              fill="#fff" font-family="system-ui">MR</text>
      </svg>
      <span>MRaccount</span>
    </div>
    <p class="subtitle">MR-ilovalar uchun yagona akkaunt</p>

    <div class="tabs">
      <button class="tab active" id="tabLogin">Kirish</button>
      <button class="tab"        id="tabRegister">Ro'yxatdan o'tish</button>
    </div>

    <!-- Kirish -->
    <form id="loginForm" class="form">
      <input id="loginUsername" type="text"     placeholder="Username"     autocomplete="username" required>
      <input id="loginPassword" type="password" placeholder="Parol"        autocomplete="current-password" required>
      <button type="submit" class="btn" id="loginBtn">Kirish</button>
    </form>

    <!-- Ro'yxatdan o'tish -->
    <form id="registerForm" class="form" style="display:none">
      <input id="regName"     type="text"     placeholder="To'liq ism">
      <input id="regUsername" type="text"     placeholder="Username (masalan: john_uz)" autocomplete="username" required>
      <input id="regPassword" type="password" placeholder="Parol (kamida 6 belgi)"     autocomplete="new-password" required>
      <button type="submit" class="btn" id="registerBtn">Ro'yxatdan o'tish</button>
    </form>

    <div id="authStatus" class="status"></div>
  </div>
</div>

<!-- ── PROFIL SAHIFASI ──────────────────────────────────────────── -->
<div id="pageProfile" class="page" style="display:none">
  <div class="card profile-card">

    <!-- Avatar + ism -->
    <div class="profile-top">
      <div class="avatar-fallback" id="profileFallback"></div>
      <div>
        <div class="profile-name"     id="profileName"></div>
        <div class="profile-username" id="profileUsername"></div>
      </div>
    </div>

    <!-- MRaccount ID — asosiy narsa -->
    <div class="id-block">
      <div class="id-label">MRaccount ID</div>
      <code class="id-value" id="profileId"></code>
      <button class="copy-btn" id="copyIdBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        ID nusxalash
      </button>
      <div class="id-hint">
        Boshqa MR-ilovalarda "MRaccount bilan kirish" tugmasini bosganda
        shu <strong>ID</strong> ni kiritasiz
      </div>
    </div>

    <!-- Ism tahrirlash -->
    <div class="edit-section">
      <label class="field-label">Ismni o'zgartirish</label>
      <div class="edit-row">
        <input type="text" id="editName" class="edit-input" placeholder="Yangi ism">
        <button class="save-btn" id="saveNameBtn">Saqlash</button>
      </div>
    </div>

    <button class="logout-btn" id="logoutBtn">Chiqish</button>
  </div>
</div>

<script type="module" src="/modules/main.js"></script>
</body>
</html>
