<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR Games — MRaccount Demo</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #2a313c;
    --text: #e6edf3; --muted: #8b949e;
    --blue: #5b8ef5; --green: #3fb950; --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 36px 32px; width: 100%; max-width: 380px;
  }

  /* Logo */
  .app-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .app-logo svg rect { fill: var(--green); }
  .app-logo span { font-size: 20px; font-weight: 700; }
  .app-desc { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

  /* --- TIZIMGA KIRMAGAN holat --- */
  #viewGuest { display: block; }
  .mra-btn {
    width: 100%; padding: 13px 18px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--blue); color: #fff;
    border: none; border-radius: 11px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .mra-btn:hover  { opacity: .88; }
  .mra-btn:active { transform: scale(.98); }
  .mra-btn:disabled { opacity: .5; cursor: not-allowed; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
  .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
  .divider span { font-size: 12px; color: var(--muted); }

  .note {
    font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6;
  }
  .note a { color: var(--blue); text-decoration: none; }
  .note a:hover { text-decoration: underline; }

  #loginError {
    font-size: 13px; color: var(--red);
    text-align: center; margin-top: 12px; min-height: 18px;
  }

  /* --- KIRGAN holat --- */
  #viewUser { display: none; }

  .user-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
  }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--blue); display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; flex-shrink: 0;
  }
  .user-name     { font-size: 17px; font-weight: 700; }
  .user-username { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .user-id-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 20px;
  }
  .user-id-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .user-id-val   { font-family: monospace; font-size: 12px; word-break: break-all; color: var(--text); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(63,185,80,.12); color: var(--green);
    border: 1px solid rgba(63,185,80,.3);
    border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600;
    margin-bottom: 20px;
  }
  .badge::before { content: '●'; font-size: 8px; }

  .logout-btn {
    width: 100%; padding: 10px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 9px;
    font-size: 13px; cursor: pointer; transition: all .15s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="card">
  <div class="app-logo">
    <svg width="32" height="32" viewBox="0 0 36 36">
      <rect width="36" height="36" rx="9"/>
      <text x="18" y="25" text-anchor="middle" font-size="14" font-weight="800"
            fill="#fff" font-family="system-ui">MG</text>
    </svg>
    <span>MR Games</span>
  </div>
  <p class="app-desc">O'yinlar platformasiga xush kelibsiz</p>

  <!-- MEHMON ko'rinish -->
  <div id="viewGuest">
    <button class="mra-btn" id="loginBtn">
      <svg width="20" height="20" viewBox="0 0 36 36">
        <rect width="36" height="36" rx="8" fill="rgba(255,255,255,.25)"/>
        <text x="18" y="25" text-anchor="middle" font-size="13" font-weight="700"
              fill="#fff" font-family="system-ui">MR</text>
      </svg>
      MRaccount bilan kirish
    </button>

    <div id="loginError"></div>

    <div class="divider"><hr><span>yoki</span><hr></div>
    <p class="note">
      MRaccount akkauntingiz yo'qmi?
      <a href="https://mrplatform-9cdc0.web.app" target="_blank">Ro'yxatdan o'ting →</a>
    </p>
  </div>

  <!-- KIRGAN foydalanuvchi ko'rinish -->
  <div id="viewUser">
    <div class="badge">Tizimga kirildi</div>
    <div class="user-header">
      <div class="avatar" id="uAvatar">?</div>
      <div>
        <div class="user-name"     id="uName"></div>
        <div class="user-username" id="uUsername"></div>
      </div>
    </div>
    <div class="user-id-box">
      <div class="user-id-label">MRaccount ID</div>
      <div class="user-id-val" id="uId"></div>
    </div>
    <button class="logout-btn" id="logoutBtn">Chiqish</button>
  </div>
</div>

<script type="module">
// ──────────────────────────────────────────────────────────────────
// SDK ni import qilish (o'zingizning URL ga o'zgartiring)
// ──────────────────────────────────────────────────────────────────
import MRaccount from '../modules/mraccount-sdk.js';

const viewGuest = document.getElementById('viewGuest');
const viewUser  = document.getElementById('viewUser');
const loginBtn  = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const loginErr  = document.getElementById('loginError');

// ── Sahifa yuklanganda sessiyani tekshirish ──────────────────────
const saved = MRaccount.getSession();
if (saved) renderUser(saved);

// ── Login tugmasi ────────────────────────────────────────────────
loginBtn.onclick = async () => {
  loginBtn.disabled    = true;
  loginBtn.textContent = 'Yuklanmoqda...';
  loginErr.textContent = '';

  try {
    const user = await MRaccount.login();   // ← popup ochiladi, xabar kutiladi
    MRaccount.saveSession(user);            // ← localStorage ga saqlanadi
    renderUser(user);
  } catch (err) {
    loginErr.textContent = err.message;
  } finally {
    loginBtn.disabled    = false;
    loginBtn.textContent = 'MRaccount bilan kirish'; // matnni tiklash
    // (innerHTML emas, chunki SVG yo'qoladi — kerak bo'lsa qayta render qiling)
  }
};

// ── Chiqish tugmasi ──────────────────────────────────────────────
logoutBtn.onclick = () => {
  MRaccount.logout();
  viewUser.style.display  = 'none';
  viewGuest.style.display = 'block';
};

// ── UI ko'rsatish ────────────────────────────────────────────────
function renderUser(user) {
  document.getElementById('uName').textContent     = user.name     || '—';
  document.getElementById('uUsername').textContent = '@' + (user.username || '');
  document.getElementById('uId').textContent       = user.uid;
  document.getElementById('uAvatar').textContent   = (user.name || '?')[0].toUpperCase();

  viewGuest.style.display = 'none';
  viewUser.style.display  = 'block';
}
</script>
</body>
</html>
